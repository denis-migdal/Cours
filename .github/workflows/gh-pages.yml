name: Build and deploy Github pages.

on:
  push:
  workflow_dispatch:

concurrency:
  group: "pages"

jobs:
  build:
    runs-on : ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run : |
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dev
          path: './dist/dev'
  deploy:
    needs      : build
    runs-on    : ubuntu-latest
    permissions:
      pages   : write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dev
          path: './dist/dev/'
      # Upload github-pages (3 steps)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/dev/'
      - uses: actions/deploy-pages@v4
